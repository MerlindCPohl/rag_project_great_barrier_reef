# RAG Configuration File
# centralizes all hardcoded values for easy management

ingestion:

  breakpoint_threshold_amount: 80.0
  breakpoint_threshold_type: "percentile"
  
  # Embedding model 
  embedding_model: "BAAI/bge-m3"
  
  # Document page range
  default_pages: [5, 87]

# embedding settings
embedding:
  model_name: "BAAI/bge-m3"
  embedding_dimension: 1536  

# vector store settings
vector_store:
  persist_directory: "data/vector_store"
  index_type: "FAISS"

# retrieval settings
retrieval:
  score_threshold: 0.3
  top_k: 5
  min_chunk_length: 100

# llm settings 
llm:
  model: "llama3"
  temperature: 0.1
  top_p: 0.1
  max_tokens: 512

# language detection settings
language:
  default_language: "en"
  min_detection_length: 10

# data eyploration settings
data_exploration:
  top_keywords_count: 10
  min_word_length: 2
  short_document_threshold: 100
